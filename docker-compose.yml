services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nepalosint_postgres
    environment:
      POSTGRES_USER: nepal_osint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nepal_osint_dev}
      POSTGRES_DB: nepal_osint
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepal_osint -d nepal_osint"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nepalosint_redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nepalosint_migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:${POSTGRES_PASSWORD:-nepal_osint_dev}@postgres:5432/nepal_osint
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nepalosint_api
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:${POSTGRES_PASSWORD:-nepal_osint_dev}@postgres:5432/nepal_osint
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      RUN_SCHEDULER: "false"
      ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      TWITTER_API_TIER: ${TWITTER_API_TIER:-free}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      worker:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nepalosint_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:${POSTGRES_PASSWORD:-nepal_osint_dev}@postgres:5432/nepal_osint
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      RUN_SCHEDULER: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      TWITTER_API_TIER: ${TWITTER_API_TIER:-free}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.worker
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nepalosint_frontend
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ""
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "if [ ! -d /app/node_modules/@blueprintjs/core ]; then npm install; fi && npm run dev -- --host"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
