services:
  # PostgreSQL Database with pgvector for ML embeddings
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nepal_osint_postgres
    environment:
      POSTGRES_USER: nepal_osint
      POSTGRES_PASSWORD: nepal_osint_dev
      POSTGRES_DB: nepal_osint
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepal_osint"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Performance tuning for OSINT workload
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "work_mem=32MB"

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: nepal_osint_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-nepal_osint_dev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2G"
    ports:
      - "127.0.0.1:7474:7474"  # HTTP (local only)
      - "127.0.0.1:7687:7687"  # Bolt (local only)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-nepal_osint_dev}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: nepal_osint_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  migrate:
    build:
      context: ./backend-v5
      dockerfile: Dockerfile
    container_name: nepal_osint_migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:nepal_osint_dev@postgres:5432/nepal_osint
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-nepal_osint_dev}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      DEBUG: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend-v5:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  seed_elections:
    build:
      context: ./backend-v5
      dockerfile: Dockerfile
    container_name: nepal_osint_seed_elections
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:nepal_osint_dev@postgres:5432/nepal_osint
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      DEBUG: "false"
    volumes:
      - ./backend-v5:/app
      # Script expects /frontend/public/data (monorepo-relative path).
      - ./frontend/public/data:/frontend/public/data:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python scripts/import_election_data.py --all
    restart: "no"

  backend:
    build:
      context: ./backend-v5
      dockerfile: Dockerfile
    container_name: nepal_osint_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:nepal_osint_dev@postgres:5432/nepal_osint
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-nepal_osint_dev}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      DEBUG: "true"
      RUN_SCHEDULER: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend-v5:/app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Background Worker (scheduler-driven ingestion/ML jobs)
  worker:
    build:
      context: ./backend-v5
      dockerfile: Dockerfile
    container_name: nepal_osint_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://nepal_osint:nepal_osint_dev@postgres:5432/nepal_osint
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-nepal_osint_dev}
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      RUN_SCHEDULER: "true"
    volumes:
      - ./backend-v5:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    command: python -m app.worker
    restart: unless-stopped

  # React Frontend (production build with API proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nepal_osint_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    command: sh -c "npm install express http-proxy-middleware --save 2>/dev/null && npx vite build && node server.js"

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
